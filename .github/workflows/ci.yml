# =============================================================================
# CI Pipeline — Runs on every PR and push to main
# Lint, type-check, and build verification
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript compiler
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        run: npm run build

      - name: Verify build artifacts exist
        run: |
          test -f dist/index.cjs || (echo "ERROR: dist/index.cjs not found" && exit 1)
          test -d dist/public || (echo "ERROR: dist/public not found" && exit 1)
          echo "Build artifacts verified:"
          ls -la dist/
          du -sh dist/

  lint-python:
    name: Lint Python (Prediction Service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/prediction-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff bandit

      - name: Run Ruff linter
        run: ruff check app.py

      - name: Run Bandit security scan
        run: bandit -r . -ll
