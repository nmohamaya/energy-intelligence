# =============================================================================
# Network Policies — Zero-trust service mesh
#
# Principle: deny all by default, allow only known communication paths
#   web-app → prediction-service (REST API)
#   web-app → timescaledb (PostgreSQL)
#   prediction-service → timescaledb (PostgreSQL)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: energy-intelligence
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow web-app to receive traffic from ingress and talk to backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-app-policy
  namespace: energy-intelligence
spec:
  podSelector:
    matchLabels:
      app: web-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 5000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: prediction-service
      ports:
        - port: 8001
    - to:
        - podSelector:
            matchLabels:
              app: timescaledb
      ports:
        - port: 5432
    # Allow DNS resolution
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Prediction service: receives from web-app, talks to DB
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prediction-service-policy
  namespace: energy-intelligence
spec:
  podSelector:
    matchLabels:
      app: prediction-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: web-app
      ports:
        - port: 8001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: timescaledb
      ports:
        - port: 5432
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# TimescaleDB: only accepts connections from app services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: timescaledb-policy
  namespace: energy-intelligence
spec:
  podSelector:
    matchLabels:
      app: timescaledb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: web-app
        - podSelector:
            matchLabels:
              app: prediction-service
      ports:
        - port: 5432
