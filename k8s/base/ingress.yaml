# =============================================================================
# Ingress — Route external traffic to services
# Assumes nginx-ingress controller is installed in the cluster
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: energy-ingress
  namespace: energy-intelligence
  labels:
    app.kubernetes.io/part-of: energy-intelligence
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - energy.example.com
      secretName: energy-tls
  rules:
    - host: energy.example.com
      http:
        paths:
          # Main web application (frontend + API)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 80
          # Prediction API — direct access for external integrations
          - path: /ml
            pathType: Prefix
            backend:
              service:
                name: prediction-service
                port:
                  number: 8001
