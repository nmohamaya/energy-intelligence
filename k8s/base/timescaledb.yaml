# =============================================================================
# TimescaleDB — Time-series database (StatefulSet for data persistence)
#
# NOTE: In production, prefer a managed database service (Timescale Cloud,
# AWS RDS, GCP Cloud SQL). This manifest is for development/staging.
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescaledb
  namespace: energy-intelligence
  labels:
    app: timescaledb
    app.kubernetes.io/part-of: energy-intelligence
    app.kubernetes.io/component: database
spec:
  serviceName: timescaledb
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb:latest-pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: energy_intelligence
            - name: POSTGRES_USER
              value: energy
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: energy-db-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: timescale-storage
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - energy
                - -d
                - energy_intelligence
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - energy
                - -d
                - energy_intelligence
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: timescale-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: energy-intelligence
  labels:
    app: timescaledb
spec:
  selector:
    app: timescaledb
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
  # Headless service for StatefulSet DNS
  clusterIP: None
